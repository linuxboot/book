name: Vale Action
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build:
    name: Vale
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install vale
        run: sudo snap install vale

      - name: Lint prose
        run: |
          vale sync
          vale src/intro.md
          vale src/openpower.md
